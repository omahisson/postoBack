services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=testdata'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d testdata"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
